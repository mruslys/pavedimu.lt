<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sukurti nuorodą – pavedimu.lt</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#f9f9fb] text-zinc-900 min-h-[100dvh] flex flex-col justify-start items-center p-4 pt-4 sm:pt-12 antialiased">

    <div class="w-full max-w-md flex flex-col items-center gap-5">

        <main class="bg-white w-full rounded-3xl shadow-xl shadow-zinc-200/40 border border-zinc-100/80 p-5 sm:p-6 flex flex-col gap-4">
            
            <!-- Antraštės dalis su veikiančia pradinio puslapio ikona kairėje -->
            <div class="border-b border-zinc-100 pb-3 flex items-center gap-3.5 text-left">
                <!-- Spaudžiama ikona, nukreipianti į index.html -->
                <a href="./index.html" class="w-11 h-11 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl flex items-center justify-center text-xl shrink-0 shadow-sm shadow-emerald-600/10 transition-colors cursor-pointer group" title="Į pradinį puslapį">
                    <i class="fa-solid fa-money-bill-transfer group-hover:scale-105 transition-transform"></i>
                </a>
                
                <div class="min-w-0">
                    <h2 class="text-base font-bold text-zinc-900 leading-tight">Sukurti pavedimo nuorodą</h2>
                    <p class="text-xs text-zinc-500 mt-0.5 truncate">Suveskite duomenis, kuriais norite dalintis.</p>
                </div>
            </div>

            <!-- Formos laukai -->
            <div class="space-y-3.5">
                <div>
                    <!-- PAKEITIMAS: Paryškinta antraštės spalva į text-zinc-700 -->
                    <label class="block text-[11px] font-bold uppercase tracking-wider text-zinc-700 mb-1">Mokėjimo gavėjas *</label>
                    <input type="text" id="input-name" placeholder="Pvz.: Vardenis Pavardenis" class="w-full text-sm bg-zinc-50 border border-zinc-200/60 rounded-xl px-3.5 py-2.5 focus:outline-hidden focus:border-emerald-600 focus:bg-white transition-all text-zinc-900 placeholder-zinc-400">
                </div>

                <div>
                    <!-- PAKEITIMAS: Paryškinta antraštės spalva į text-zinc-700 -->
                    <label class="block text-[11px] font-bold uppercase tracking-wider text-zinc-700 mb-1">Sąskaitos numeris (IBAN) *</label>
                    <input type="text" id="input-iban" placeholder="LT00 0000 0000 0000 0000" class="w-full text-sm font-mono bg-zinc-50 border border-zinc-200/60 rounded-xl px-3.5 py-2.5 focus:outline-hidden focus:border-emerald-600 focus:bg-white transition-all text-zinc-900 placeholder-zinc-400">
                </div>

                <div>
                    <!-- PAKEITIMAS: Paryškinta antraštės spalva į text-zinc-700 -->
                    <label class="block text-[11px] font-bold uppercase tracking-wider text-zinc-700 mb-1">Mokėjimo paskirtis <span class="text-zinc-400 font-normal lowercase">(neprivaloma)</span></label>
                    <input type="text" id="input-purpose" placeholder="Pvz.: Už vakarienę" class="w-full text-sm bg-zinc-50 border border-zinc-200/60 rounded-xl px-3.5 py-2.5 focus:outline-hidden focus:border-emerald-600 focus:bg-white transition-all text-zinc-900 placeholder-zinc-400">
                </div>

                <div>
                    <!-- PAKEITIMAS: Paryškinta antraštės spalva į text-zinc-700 -->
                    <label class="block text-[11px] font-bold uppercase tracking-wider text-zinc-700 mb-1">Suma, EUR <span class="text-zinc-400 font-normal lowercase">(neprivaloma)</span></label>
                    <input type="number" id="input-amount" step="0.01" min="0" placeholder="0.00" class="w-full text-sm bg-zinc-50 border border-zinc-200/60 rounded-xl px-3.5 py-2.5 focus:outline-hidden focus:border-emerald-600 focus:bg-white transition-all text-zinc-900 placeholder-zinc-400">
                </div>
            </div>

            <!-- Veiksmo mygtukas -->
            <button onclick="generateLink(this)" class="w-full flex items-center justify-center gap-2 py-3.5 bg-zinc-700 hover:bg-zinc-900 text-white rounded-2xl shadow-md shadow-zinc-950/10 font-semibold text-sm transition-all active:scale-98 cursor-pointer mt-2">
                <i class="fa-solid fa-link text-base"></i>
                <span>Generuoti nuorodą</span>
            </button>

            <!-- Rezultato blokas -->
            <div id="result-container" class="hidden mt-2 p-3 bg-emerald-50/60 border border-emerald-100 rounded-2xl flex items-center justify-between gap-3">
                <span id="generated-url" class="text-xs font-mono text-emerald-800 truncate select-all flex-1 font-medium pl-1"></span>
                <button onclick="copyLink(this)" class="bg-white text-emerald-600 hover:bg-emerald-600 hover:text-white border border-emerald-100 hover:border-transparent px-3 py-1.5 rounded-xl text-xs font-semibold shadow-xs transition-all active:scale-95 shrink-0 cursor-pointer">
                    Kopijuoti
                </button>
            </div>

        </main>

        <footer class="text-center text-xs text-zinc-400 font-medium w-full pb-4 pt-2">
            Mokėjimai paprastai &copy; <span id="year"></span> – <a href="#" class="text-zinc-500 hover:underline">pavedimu.lt</a>
        </footer>
        
    </div>

    <script>
        document.getElementById('year').innerText = new Date().getFullYear();

        function generateLink(button) {
            const name = document.getElementById('input-name').value.trim();
            const iban = document.getElementById('input-iban').value.trim();
            const purpose = document.getElementById('input-purpose').value.trim();
            const amount = document.getElementById('input-amount').value;

            if (!name || !iban) {
                alert('Prašome užpildyti privalomus laukus: Gavėją ir IBAN sąskaitą.');
                return;
            }

            const cleanIban = iban.replace(/\s+/g, '').toUpperCase();
            let pathSegments = [encodeURIComponent(name), cleanIban];

            if (purpose || amount) {
                pathSegments.push(purpose ? encodeURIComponent(purpose) : '-');
            }
            if (amount && amount > 0) {
                pathSegments.push(parseFloat(amount).toFixed(2));
            }

            const baseUrl = window.location.href.split('/').slice(0, -1).join('/') + '/';
            let finalUrl = `${baseUrl}${pathSegments.join('/')}`;

            const resultContainer = document.getElementById('result-container');
            const urlSpan = document.getElementById('generated-url');
            
            urlSpan.innerText = finalUrl;
            resultContainer.classList.remove('hidden');
            resultContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function copyLink(button) {
            const urlText = document.getElementById('generated-url').innerText;
            navigator.clipboard.writeText(urlText).then(() => {
                const oldText = button.innerText;
                button.innerText = "Nukopijuota!";
                button.classList.remove('bg-white', 'text-emerald-600', 'border-emerald-100');
                button.classList.add('bg-emerald-600', 'text-white', 'border-transparent');
                
                setTimeout(() => {
                    button.innerText = oldText;
                    button.classList.remove('bg-emerald-600', 'text-white', 'border-transparent');
                    button.classList.add('bg-white', 'text-emerald-600', 'border-emerald-100');
                }, 2000);
            });
        }
    </script>
</body>
</html>
