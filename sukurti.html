<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sukurti nuorodą – pavedimu.lt</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col justify-start items-center p-4 pt-4 sm:pt-12 antialiased">

    <div class="w-full max-w-md flex flex-col items-center gap-5">
        
        <main class="bg-white w-full rounded-3xl shadow-xl shadow-slate-100 border border-slate-100 p-5 sm:p-6 flex flex-col gap-4">
            
            <div class="border-b border-slate-100 pb-3">
                <h1 class="text-lg font-bold text-slate-800">Sukurti pavedimo nuorodą</h1>
                <p class="text-xs text-slate-400 mt-0.5">Suveskite duomenis, kuriais norite dalintis.</p>
            </div>

            <div class="space-y-3.5">
                <div>
                    <label class="block text-[11px] font-semibold uppercase tracking-wider text-slate-400 mb-1">Mokėjimo gavėjas *</label>
                    <input type="text" id="input-name" placeholder="Pvz.: Vardenis Pavardenis" class="w-full text-sm bg-slate-50 border border-slate-200 rounded-xl px-3.5 py-2.5 focus:outline-hidden focus:border-emerald-500 focus:bg-white transition-all">
                </div>

                <div>
                    <label class="block text-[11px] font-semibold uppercase tracking-wider text-slate-400 mb-1">Sąskaitos numeris (IBAN) *</label>
                    <input type="text" id="input-iban" placeholder="LT00 0000 0000 0000 0000" class="w-full text-sm font-mono bg-slate-50 border border-slate-200 rounded-xl px-3.5 py-2.5 focus:outline-hidden focus:border-emerald-500 focus:bg-white transition-all">
                </div>

                <div>
                    <label class="block text-[11px] font-semibold uppercase tracking-wider text-slate-400 mb-1">Mokėjimo paskirtis <span class="text-slate-300 font-normal">(neprivaloma)</span></label>
                    <input type="text" id="input-purpose" placeholder="Pvz.: Už vakarienę" class="w-full text-sm bg-slate-50 border border-slate-200 rounded-xl px-3.5 py-2.5 focus:outline-hidden focus:border-emerald-500 focus:bg-white transition-all">
                </div>

                <div>
                    <label class="block text-[11px] font-semibold uppercase tracking-wider text-slate-400 mb-1">Suma, EUR <span class="text-slate-300 font-normal">(neprivaloma)</span></label>
                    <input type="number" id="input-amount" step="0.01" min="0" placeholder="0.00" class="w-full text-sm bg-slate-50 border border-slate-200 rounded-xl px-3.5 py-2.5 focus:outline-hidden focus:border-emerald-500 focus:bg-white transition-all">
                </div>

                <div class="pt-1">
                    <button onclick="toggleAdvanced()" class="text-xs font-medium text-slate-400 hover:text-slate-600 flex items-center gap-1 cursor-pointer select-none">
                        <i id="advanced-chevron" class="fa-solid fa-chevron-right text-[10px] transition-transform"></i> Papildomi dizaino nustatymai
                    </button>
                    
                    <div id="advanced-fields" class="hidden mt-2.5 space-y-3 pt-2 border-t border-dashed border-slate-100">
                        <div>
                            <label class="block text-[10px] font-semibold uppercase tracking-wider text-slate-400 mb-1">Profilio nuotraukos URL</label>
                            <input type="url" id="input-avatar" placeholder="https://example.com/foto.jpg" class="w-full text-xs bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 focus:outline-hidden focus:border-emerald-500 focus:bg-white transition-all">
                        </div>
                        <div>
                            <label class="block text-[10px] font-semibold uppercase tracking-wider text-slate-400 mb-1">Viršutinio banerio URL</label>
                            <input type="url" id="input-banner" placeholder="https://example.com/banner.jpg" class="w-full text-xs bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 focus:outline-hidden focus:border-emerald-500 focus:bg-white transition-all">
                        </div>
                    </div>
                </div>
            </div>

            <button onclick="generateLink(this)" class="w-full flex items-center justify-center gap-2 py-3 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl shadow-md shadow-emerald-100 font-bold text-sm transition-all active:scale-98 cursor-pointer mt-2">
                <i class="fa-solid fa-link text-base"></i>
                <span>Sugeneruoti nuorodą</span>
            </button>

            <div id="result-container" class="hidden mt-2 p-3 bg-emerald-50 border border-emerald-200/60 rounded-xl flex items-center justify-between gap-3">
                <span id="generated-url" class="text-xs font-mono text-emerald-800 truncate select-all flex-1"></span>
                <button onclick="copyLink(this)" class="bg-white text-emerald-700 hover:bg-emerald-600 hover:text-white px-3 py-1.5 rounded-lg text-xs font-semibold shadow-xs transition-all active:scale-95 shrink-0 cursor-pointer">
                    Kopijuoti
                </button>
            </div>

        </main>

        <footer class="text-center text-xs text-slate-400 font-medium pb-4">
            <a href="./index.html" class="text-slate-500 hover:underline"><i class="fa-solid fa-arrow-left text-[10px]"></i> Atgal į pradžią</a>
        </footer>
        
    </div>

    <script>
        // Papildomų laukų išskleidimas
        function toggleAdvanced() {
            const fields = document.getElementById('advanced-fields');
            const chevron = document.getElementById('advanced-chevron');
            const isHidden = fields.classList.contains('hidden');
            
            if (isHidden) {
                fields.classList.remove('hidden');
                chevron.classList.add('rotate-90');
            } else {
                fields.classList.add('hidden');
                chevron.classList.remove('rotate-90');
            }
        }

        // Nuorodos generavimas
        function generateLink(button) {
            const name = document.getElementById('input-name').value.trim();
            const iban = document.getElementById('input-iban').value.trim();
            const purpose = document.getElementById('input-purpose').value.trim();
            const amount = document.getElementById('input-amount').value;
            const avatar = document.getElementById('input-avatar').value.trim();
            const banner = document.getElementById('input-banner').value.trim();

            if (!name || !iban) {
                alert('Prašome užpildyti privalomus laukus: Gavėją ir IBAN sąskaitą.');
                return;
            }

            const params = new URLSearchParams();
            params.set('g', encodeURIComponent(name));
            params.set('i', encodeURIComponent(iban.replace(/\s+/g, ''))); 

            if (purpose) params.set('p', encodeURIComponent(purpose));
            if (amount && amount > 0) params.set('s', parseFloat(amount).toFixed(2));
            if (avatar) params.set('a', encodeURIComponent(avatar));
            if (banner) params.set('b', encodeURIComponent(banner));

            // Nukreipiame tiksliai į index.html tame pačiame aplanke
            const baseUrl = window.location.href.split('/').slice(0, -1).join('/') + '/index.html';
            const finalUrl = `${baseUrl}?${params.toString()}`;

            const resultContainer = document.getElementById('result-container');
            const urlSpan = document.getElementById('generated-url');
            
            urlSpan.innerText = finalUrl;
            resultContainer.classList.remove('hidden');
            
            resultContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // Nuorodos kopijavimas
        function copyLink(button) {
            const urlText = document.getElementById('generated-url').innerText;
            navigator.clipboard.writeText(urlText).then(() => {
                const oldText = button.innerText;
                button.innerText = "Nukopijuota!";
                button.classList.replace('text-emerald-700', 'bg-emerald-600');
                button.classList.add('text-white');
                
                setTimeout(() => {
                    button.innerText = oldText;
                    button.classList.replace('bg-emerald-600', 'text-emerald-700');
                    button.classList.remove('text-white');
                }, 2000);
            });
        }
    </script>
</body>
</html>
