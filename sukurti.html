<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sukurti nuorodą – pavedimu.lt</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#f9f9fb] text-zinc-900 min-h-[100dvh] flex flex-col justify-start items-center p-4 pt-4 sm:pt-12 antialiased">

    <div class="w-full max-w-md flex flex-col items-center gap-5">

        <main class="bg-white w-full rounded-3xl shadow-xl shadow-zinc-200/40 border border-zinc-100/80 p-5 sm:p-6 flex flex-col gap-4">
            
            <div class="border-b border-zinc-100 pb-3 flex items-center justify-between">
                <a href="./index.html" class="w-9 h-9 bg-zinc-50 hover:bg-white text-zinc-500 hover:text-zinc-900 border border-zinc-200/60 hover:border-zinc-400 rounded-xl flex items-center justify-center text-sm shadow-xs hover:shadow-md hover:shadow-zinc-950/5 transition-all cursor-pointer group" title="Grįžti į pradžią">
                    <i class="fa-solid fa-house group-hover:scale-105 transition-transform"></i>
                </a>

                <a href="./index.html" class="inline-flex items-center cursor-pointer tracking-tight text-right leading-none">
                    <i class="fa-solid fa-wallet text-emerald-600 mr-1.5 text-[0.95em]"></i>
                    <span class="leading-none">
                        <span class="text-xl font-extrabold text-zinc-900 inline-block leading-none">pavedimu</span><span class="text-xl font-extrabold text-emerald-600 inline-block leading-none">.lt</span>
                    </span>
                </a>
            </div>

            <div class="mt-1 mb-1 flex items-center justify-between gap-4">
                <div class="flex flex-col gap-1">
                    <h2 class="text-sm font-bold text-zinc-800 uppercase tracking-wide">
                        Mokėjimo duomenys
                    </h2>
                    <p class="text-xs text-zinc-400">Suveskite duomenis dalinimuisi</p>
                </div>

                <div class="flex items-center gap-2 shrink-0">
                    <button onclick="fillSampleData()" class="w-10 h-10 bg-zinc-50 hover:bg-white text-zinc-500 hover:text-emerald-600 border border-zinc-200/60 hover:border-emerald-500 rounded-xl flex items-center justify-center text-base shadow-xs hover:shadow-md hover:shadow-emerald-600/10 transition-all cursor-pointer group" title="Užpildyti pavyzdiniais duomenimis">
                        <i class="fa-solid fa-wand-magic-sparkles group-hover:scale-105 transition-transform"></i>
                    </button>

                    <button onclick="resetForm()" class="w-10 h-10 bg-zinc-50 hover:bg-white text-zinc-500 hover:text-red-600 border border-zinc-200/60 hover:border-red-400 rounded-xl flex items-center justify-center text-base shadow-xs hover:shadow-md hover:shadow-red-600/10 transition-all cursor-pointer group" title="Išvalyti formą">
                        <i class="fa-solid fa-trash-can group-hover:scale-105 transition-transform"></i>
                    </button>
                </div>
            </div>

            <div class="space-y-3.5">
                <div>
                    <label class="block text-[11px] font-bold uppercase tracking-wider text-zinc-700 mb-1">Gavėjas *</label>
                    <input type="text" id="input-name" oninput="clearError('input-name')" placeholder="Pvz.: Vardenis Pavardenis" class="w-full text-sm bg-zinc-50 border border-zinc-200/60 rounded-xl px-3.5 py-2.5 focus:outline-hidden focus:border-emerald-600 focus:bg-white transition-all text-zinc-900 placeholder-zinc-400">
                    <p id="error-name" class="hidden text-[11px] text-red-600 font-medium mt-1 pl-1"><i class="fa-solid fa-circle-exclamation mr-1"></i>Būtina nurodyti</p>
                </div>

                <div>
                    <label class="block text-[11px] font-bold uppercase tracking-wider text-zinc-700 mb-1">Sąskaitos numeris (IBAN) *</label>
                    <input type="text" id="input-iban" oninput="clearError('input-iban')" placeholder="LT00 0000 0000 0000 0000" class="w-full text-sm font-mono bg-zinc-50 border border-zinc-200/60 rounded-xl px-3.5 py-2.5 focus:outline-hidden focus:border-emerald-600 focus:bg-white transition-all text-zinc-900 placeholder-zinc-400">
                    <p id="error-iban" class="hidden text-[11px] text-red-600 font-medium mt-1 pl-1"><i class="fa-solid fa-circle-exclamation mr-1"></i><span id="error-iban-text">Būtina nurodyti</span></p>
                </div>

                <div>
                    <label class="block text-[11px] font-bold uppercase tracking-wider text-zinc-700 mb-1">Mokėjimo paskirtis <span class="text-zinc-400 font-normal lowercase">(neprivaloma)</span></label>
                    <input type="text" id="input-purpose" placeholder="Pvz.: Už vakarienę" class="w-full text-sm bg-zinc-50 border border-zinc-200/60 rounded-xl px-3.5 py-2.5 focus:outline-hidden focus:border-emerald-600 focus:bg-white transition-all text-zinc-900 placeholder-zinc-400">
                </div>

                <div>
                    <label class="block text-[11px] font-bold uppercase tracking-wider text-zinc-700 mb-1">Suma, EUR <span class="text-zinc-400 font-normal lowercase">(neprivaloma)</span></label>
                    <input type="number" id="input-amount" step="0.01" min="0" placeholder="0.00" class="w-full text-sm bg-zinc-50 border border-zinc-200/60 rounded-xl px-3.5 py-2.5 focus:outline-hidden focus:border-emerald-600 focus:bg-white transition-all text-zinc-900 placeholder-zinc-400">
                </div>
            </div>

            <!-- PAKEISTAS MYGTUKAS: GRĄŽINTA NUORODOS IKONA IR NAUJAS TEKSTAS -->
            <button id="btn-submit" onclick="generateLink()" class="w-full flex items-center justify-center gap-2 py-3.5 bg-zinc-700 hover:bg-zinc-900 text-white rounded-2xl shadow-md shadow-zinc-950/10 font-semibold text-sm transition-all active:scale-98 cursor-pointer mt-2 disabled:opacity-75 disabled:cursor-not-allowed">
                <i id="btn-icon" class="fa-solid fa-link text-sm"></i>
                <span id="btn-text">Gauti nuorodą</span>
            </button>

            <!-- PAKEISTAS REZULTATO TEKSTAS -->
            <div id="result-container" class="hidden mt-2 animate-fade-in">
                <div class="p-4 bg-emerald-50/60 border border-emerald-100 rounded-2xl flex flex-col gap-2">
                    <span class="text-[10px] font-bold uppercase tracking-wider text-emerald-800 text-center block">Mokėjimo duomenys pasiekiami adresu:</span>
                    <a id="generated-url" href="#" target="_blank" class="text-xs font-mono text-emerald-700 hover:text-emerald-900 underline text-center break-all font-medium px-1 select-all transition-colors"></a>
                </div>
            </div>

        </main>

        <footer class="text-center text-xs text-zinc-400 font-medium w-full pb-4 pt-2">
            Mokėjimai paprastai &copy; <span id="year"></span> – <a href="./index.html" class="text-zinc-500 hover:underline">pavedimu.lt</a>
        </footer>
        
    </div>

    <script>
        document.getElementById('year').innerText = new Date().getFullYear();

        function fillSampleData() {
            document.getElementById('input-name').value = "Testas Testauskas";
            document.getElementById('input-iban').value = "LT000000000000000000";
            document.getElementById('input-purpose').value = "Arbatpinigiai";
            document.getElementById('input-amount').value = "10";

            clearError('input-name');
            clearError('input-iban');
        }

        function resetForm() {
            document.getElementById('input-name').value = "";
            document.getElementById('input-iban').value = "";
            document.getElementById('input-purpose').value = "";
            document.getElementById('input-amount').value = "";

            clearError('input-name');
            clearError('input-iban');

            document.getElementById('result-container').classList.add('hidden');
        }

        function clearError(inputId) {
            const inputField = document.getElementById(inputId);
            const errorContainer = document.getElementById(inputId === 'input-name' ? 'error-name' : 'error-iban');
            if (inputField && errorContainer) {
                inputField.classList.remove('border-red-500', 'focus:border-red-500');
                inputField.classList.add('border-zinc-200/60', 'focus:border-emerald-600');
                errorContainer.classList.add('hidden');
            }
        }

        function generateLink() {
            const nameField = document.getElementById('input-name');
            const ibanField = document.getElementById('input-iban');
            const errorName = document.getElementById('error-name');
            const errorIban = document.getElementById('error-iban');
            const errorIbanText = document.getElementById('error-iban-text');
            const resultContainer = document.getElementById('result-container');
            
            const btnSubmit = document.getElementById('btn-submit');
            const btnIcon = document.getElementById('btn-icon');
            const btnText = document.getElementById('btn-text');

            const name = nameField.value.trim();
            const iban = ibanField.value.trim();
            const purpose = document.getElementById('input-purpose').value.trim();
            const amount = document.getElementById('input-amount').value;

            let hasError = false;
            if (!name) {
                nameField.classList.add('border-red-500', 'focus:border-red-500');
                errorName.classList.remove('hidden');
                hasError = true;
            }

            const cleanIban = iban.replace(/\s+/g, '').toUpperCase();
            if (!iban) {
                errorIbanText.innerText = "Būtina nurodyti";
                ibanField.classList.add('border-red-500', 'focus:border-red-500');
                errorIban.classList.remove('hidden');
                hasError = true;
            } else if (cleanIban.length !== 20) {
                errorIbanText.innerText = "Netinkamas formatas";
                ibanField.classList.add('border-red-500', 'focus:border-red-500');
                errorIban.classList.remove('hidden');
                hasError = true;
            }

            if (hasError) { 
                resultContainer.classList.add('hidden'); 
                return; 
            }

            // Krovimosi būsena
            resultContainer.classList.add('hidden');
            btnSubmit.disabled = true;
            btnIcon.className = "fa-solid fa-circle-notch animate-spin text-sm";
            btnText.innerText = "Kuriama...";

            setTimeout(() => {
                let pathSegments = [encodeURIComponent(name), cleanIban];
                if (purpose || amount) pathSegments.push(purpose ? encodeURIComponent(purpose) : '-');
                if (amount && amount > 0) pathSegments.push(parseFloat(amount).toFixed(2));

                const baseUrl = window.location.href.split('/').slice(0, -1).join('/') + '/';
                const finalUrl = `${baseUrl}${pathSegments.join('/')}`;

                const urlAnchor = document.getElementById('generated-url');
                urlAnchor.innerText = finalUrl;
                urlAnchor.href = finalUrl;

                // Atstatomas mygtukas su grandinės ikona
                btnSubmit.disabled = false;
                btnIcon.className = "fa-solid fa-link text-sm";
                btnText.innerText = "Gauti nuorodą";

                // Parodomas rezultatas
                resultContainer.classList.remove('hidden');
                resultContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 800);
        }
    </script>
</body>
</html>
