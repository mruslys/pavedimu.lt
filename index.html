<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pavedimu.lt – Greitas ir saugus rekvizitų dalinimasis</title>
    
    <meta property="og:title" content="pavedimu.lt – Mokėjimo informacija" />
    <meta property="og:description" content="Patogus rekvizitų nukopijavimas ir QR kodas greitam pavedimui." />
    <meta property="og:type" content="website" />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-[100dvh] flex flex-col justify-between p-4 antialiased">

    <main class="flex-1 flex flex-col items-center justify-center py-8">
        <div class="bg-white w-full max-w-md rounded-3xl shadow-xl shadow-slate-100 border border-slate-100 overflow-hidden">
            
            <div class="p-6 text-center bg-linear-to-b from-slate-50 to-white border-b border-slate-100">
                <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-blue-50 text-blue-600 mb-3">
                    <i class="fa-solid fa-user text-xl"></i>
                </div>
                <h1 id="recipient-name" class="text-xl font-bold text-slate-900 tracking-tight">Kraunama...</h1>
                
                <div id="amount-container" class="hidden mt-3">
                    <span id="amount-value" class="text-3xl font-extrabold text-slate-900">0.00</span>
                    <span class="text-xl font-bold text-slate-900"> €</span>
                </div>
            </div>

            <div class="p-6 space-y-4">
                
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5">Sąskaitos numeris (IBAN)</label>
                    <div class="relative flex items-center bg-slate-50 rounded-xl border border-slate-200/80 p-3 hover:border-slate-300 transition-colors">
                        <span id="iban-text" class="font-mono text-sm font-medium text-slate-700 break-all pr-12 select-all">LT000000000000000000</span>
                        <button onclick="copySingleField('iban-text', this)" class="absolute right-2 text-slate-400 hover:text-blue-600 p-2 rounded-lg hover:bg-white transition-all active:scale-95 cursor-pointer">
                            <i class="fa-regular fa-copy text-lg"></i>
                        </button>
                    </div>
                </div>

                <div id="purpose-container" class="hidden">
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5">Mokėjimo paskirtis</label>
                    <div class="relative flex items-center bg-slate-50 rounded-xl border border-slate-200/80 p-3 hover:border-slate-300 transition-colors">
                        <span id="purpose-text" class="text-sm font-medium text-slate-700 truncate pr-12 select-all">-</span>
                        <button onclick="copySingleField('purpose-text', this)" class="absolute right-2 text-slate-400 hover:text-blue-600 p-2 rounded-lg hover:bg-white transition-all active:scale-95 cursor-pointer">
                            <i class="fa-regular fa-copy text-lg"></i>
                        </button>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-3 pt-2">
                    <a href="https://pavedimu.lt/sukurti"
                       class="flex flex-col items-center justify-center text-center p-3 bg-emerald-50 hover:bg-emerald-100 rounded-xl border border-emerald-200/60 text-emerald-600 transition-all active:scale-95 cursor-pointer">
                        <i class="fa-solid fa-plus text-lg mb-1"></i>
                        <span class="text-[11px] font-medium">Sukurti nuorodą</span>
                    </a>
                    
                    <button onclick="copyAllData(this)" class="flex flex-col items-center justify-center p-3 bg-blue-50 hover:bg-blue-100 text-blue-600 rounded-xl border border-blue-100 transition-all active:scale-95 cursor-pointer">
                        <i id="copy-all-icon" class="fa-regular fa-copy text-lg mb-1"></i>
                        <span id="copy-all-text" class="text-[11px] font-medium">Kopijuoti viską</span>
                    </button>
                    
                    <button onclick="toggleQR()" class="flex flex-col items-center justify-center p-3 bg-slate-50 hover:bg-slate-100 rounded-xl border border-slate-200/60 text-slate-600 transition-all active:scale-95 cursor-pointer">
                        <i class="fa-solid fa-qrcode text-lg mb-1"></i>
                        <span class="text-[11px] font-medium">QR kodas</span>
                    </button>
                </div>

                <div id="qr-wrapper" class="hidden pt-4 flex flex-col items-center justify-center border-t border-slate-100 transition-all">
                    <div id="qrcode" class="p-3 bg-white rounded-2xl border border-slate-200/60 shadow-xs"></div>
                    <p class="text-[11px] text-slate-400 mt-2 font-medium">Nuskenuokite kodą nuorodos atidarymui</p>
                </div>

            </div>
        </div>
    </main>

    <footer class="text-center pb-4 text-xs text-slate-400 font-medium">
        Saugus rekvizitų dalinimasis &copy; <span id="year"></span> – <a href="#" class="text-slate-600 hover:underline">pavedimu.lt</a>
    </footer>

    <script>
        document.getElementById('year').innerText = new Date().getFullYear();

        const urlParams = new URLSearchParams(window.location.search);
        const iban = urlParams.get('i');
        const name = urlParams.get('g');
        const purpose = urlParams.get('p');
        const amount = urlParams.get('s');

        // Užpildome UI duomenimis
        if (!iban && !name) {
            document.getElementById('recipient-name').innerText = "Jūratė (Arbatpinigiai)";
            document.getElementById('iban-text').innerText = "LT001234567890123456";
            document.getElementById('purpose-container').classList.remove('hidden');
            document.getElementById('purpose-text').innerText = "Arbatpinigiai";
            document.getElementById('amount-container').classList.remove('hidden');
            document.getElementById('amount-value').innerText = "5.00";
        } else {
            if (name) document.getElementById('recipient-name').innerText = decodeURIComponent(name);
            if (iban) document.getElementById('iban-text').innerText = decodeURIComponent(iban).replace(/\s+/g, '').toUpperCase();
            
            if (purpose) {
                document.getElementById('purpose-container').classList.remove('hidden');
                document.getElementById('purpose-text').innerText = decodeURIComponent(purpose);
            }
            
            if (amount) {
                document.getElementById('amount-container').classList.remove('hidden');
                document.getElementById('amount-value').innerText = parseFloat(amount).toFixed(2);
            }
        }

        // Sugeneruojame QR kodą fone (bet jis paslėptas)
        new QRCode(document.getElementById("qrcode"), {
            text: window.location.href,
            width: 140,
            height: 140,
            colorDark : "#0f172a",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });

        // Vieno lauko kopijavimas
        function copySingleField(elementId, button) {
            const text = document.getElementById(elementId).innerText;
            navigator.clipboard.writeText(text).then(() => {
                const oldIcon = button.innerHTML;
                button.innerHTML = `<i class="fa-solid fa-check text-emerald-600 text-lg"></i>`;
                setTimeout(() => { button.innerHTML = oldIcon; }, 1500);
            });
        }

        // „KOPIJUOTI VISKĄ“ FUNKCIJA (jūsų sugalvotas formatas)
        function copyAllData(button) {
            const currentName = document.getElementById('recipient-name').innerText;
            const currentIban = document.getElementById('iban-text').innerText;
            const hasPurpose = !document.getElementById('purpose-container').classList.contains('hidden');
            const hasAmount = !document.getElementById('amount-container').classList.contains('hidden');

            let textToCopy = `${currentName}\n${currentIban}`;
            
            if (hasPurpose) {
                const currentPurpose = document.getElementById('purpose-text').innerText;
                textToCopy += `\n${currentPurpose}`;
            }
            if (hasAmount) {
                const currentAmount = document.getElementById('amount-value').innerText;
                textToCopy += `\n${currentAmount} €`;
            }

            navigator.clipboard.writeText(textToCopy).then(() => {
                const icon = document.getElementById('copy-all-icon');
                const text = document.getElementById('copy-all-text');
                
                // Animacija
                icon.className = "fa-solid fa-check text-lg mb-1 text-emerald-600";
                text.innerText = "Nukopijuota!";
                
                setTimeout(() => {
                    icon.className = "fa-regular fa-copy text-lg mb-1";
                    text.innerText = "Kopijuoti viską";
                }, 1500);
            });
        }

        // QR kodo rodymas / slėpimas
        function toggleQR() {
            const qrWrapper = document.getElementById('qr-wrapper');
            qrWrapper.classList.toggle('hidden');
            if (!qrWrapper.classList.contains('hidden')) {
                qrWrapper.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }
    </script>
</body>
</html>
